<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cup icon -->
  <g transform="translate(8, 8)">
    <!-- Cup body -->
    <path d="M6 8 L10 36 L26 36 L30 8 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linejoin="round"/>
    <!-- Cup handle -->
    <path d="M30 14 Q38 14 38 22 Q38 30 30 30" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
    <!-- Saucer -->
    <ellipse cx="18" cy="38" rx="16" ry="3" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
    <!-- Steam lines -->
    <path d="M12 4 Q14 1 12 -2" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M18 4 Q20 0 18 -3" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M24 4 Q26 1 24 -2" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Text -->
  <text x="60" y="26" font-family="Georgia, serif" font-size="14" font-weight="700" letter-spacing="3" fill="url(#goldGrad)">UNIVERSAL</text>
  <text x="60" y="44" font-family="Georgia, serif" font-size="11" font-weight="400" letter-spacing="6" fill="#D4B896">CAFÉ</text>
  <!-- Decorative line -->
  <line x1="60" y1="48" x2="192" y2="48" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.5"/>
</svg>
